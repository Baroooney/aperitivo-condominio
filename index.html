  <style>
    :root {
      --ink: #232323;
      --muted: #6f6a61;
      --paper: #fffaf1;
      --panel: #fffdf8;
      --sage: #7ba889;
      --sage-dark: #406f50;
      --lemon: #f4cf58;
      --coral: #e97158;
      --blue: #78a9bf;
      --line: #e7dece;
      --shadow: 0 14px 34px rgba(56, 47, 35, .12);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(140deg, rgba(123,168,137,.24), transparent 36%),
        linear-gradient(225deg, rgba(244,207,88,.28), transparent 34%),
        var(--paper);
    }
    button, input, select { font: inherit; }
    button { cursor: pointer; }

    .app {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 18px clamp(14px, 3vw, 28px) 42px;
    }

    .top {
      display: grid;
      gap: 16px;
      padding: 14px 0 10px;
    }

    .title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .headline {
      display: grid;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 8vw, 58px);
      line-height: .95;
      letter-spacing: 0;
      max-width: 780px;
    }

    .date-badge {
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      width: 72px;
      aspect-ratio: 1;
      border-radius: 8px;
      color: #2f382c;
      background: var(--lemon);
      border: 1px solid rgba(35,35,35,.1);
      box-shadow: var(--shadow);
      font-weight: 800;
      text-align: center;
      line-height: 1;
    }

    .date-badge span { display: block; font-size: 28px; }
    .date-badge small { display: block; font-size: 12px; margin-top: 4px; }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      max-width: 760px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .stat, .panel {
      background: rgba(255,253,248,.9);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 10px 28px rgba(56,47,35,.08);
    }

    .stat {
      padding: 12px;
      min-height: 88px;
    }

    .stat small {
      display: block;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .stat strong {
      display: block;
      font-size: clamp(22px, 6vw, 34px);
      line-height: 1;
    }

    .stat em {
      display: block;
      color: var(--muted);
      font-style: normal;
      margin-top: 8px;
      font-size: 13px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 14px;
      align-items: start;
    }

    .panel { padding: 14px; }

    .panel h2 {
      margin: 0 0 12px;
      font-size: 18px;
      letter-spacing: 0;
    }

    .balance {
      display: grid;
      gap: 10px;
    }

    .bar {
      height: 16px;
      overflow: hidden;
      border-radius: 999px;
      background: #efe4d1;
      display: flex;
      border: 1px solid var(--line);
    }

    .bar span { min-width: 0; transition: width .25s ease; }
    .bar .drink { background: var(--blue); }
    .bar .food { background: var(--coral); }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      display: inline-block;
      margin-right: 5px;
      vertical-align: -1px;
    }

    .tips {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .tips li {
      padding: 10px;
      border-radius: 8px;
      background: #f7edd8;
      border: 1px solid #ead9b9;
      color: #493f2d;
      font-size: 14px;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: grid;
      gap: 10px;
      padding: 10px 0;
      backdrop-filter: blur(16px);
      background: rgba(255,250,241,.84);
    }

    .tabs {
      display: flex;
      gap: 8px;
      overflow: auto;
      padding-bottom: 2px;
    }

    .tab, .ghost, .primary, .danger, .mini {
      border: 1px solid var(--line);
      border-radius: 8px;
      min-height: 42px;
      padding: 0 12px;
      background: var(--panel);
      color: var(--ink);
      font-weight: 800;
      white-space: nowrap;
    }

    .tab.active {
      border-color: var(--sage-dark);
      background: var(--sage);
      color: #fff;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .sync-status {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 36px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,253,248,.9);
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .sync-status::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--sage);
    }

    .sync-status[data-state="saving"]::before,
    .sync-status[data-state="loading"]::before { background: var(--lemon); }
    .sync-status[data-state="error"]::before { background: var(--coral); }

    .switch {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 42px;
      padding: 0 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      font-weight: 800;
    }

    .switch input { width: 18px; height: 18px; accent-color: var(--sage-dark); }

    .grid {
      display: grid;
      gap: 10px;
    }

    .reset-zone {
      display: grid;
      gap: 8px;
      justify-items: start;
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

    .reset-zone p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      max-width: 560px;
    }

    .reset-final {
      background: #ffe3dc;
      border-color: #f3b8a9;
      color: #6f2d20;
    }

    .item {
      display: grid;
      gap: 10px;
      padding: 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-left: 7px solid var(--sage);
      border-radius: 8px;
      box-shadow: 0 10px 28px rgba(56,47,35,.08);
    }

    .item[data-category="bere"] { border-left-color: var(--blue); }
    .item[data-category="salato"] { border-left-color: var(--coral); }
    .item[data-category="dolce"] { border-left-color: var(--lemon); }
    .item[data-category="extra"] { border-left-color: var(--sage); }
    .item.taken { opacity: .78; }

    .item-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: start;
    }

    .item h3 {
      margin: 0;
      font-size: 17px;
      letter-spacing: 0;
    }

    .item p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .price {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 54px;
      height: 34px;
      border-radius: 8px;
      background: #f2eadc;
      color: #453b2e;
      font-weight: 900;
    }

    .claim {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
    }

    input, select {
      min-height: 42px;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 0 11px;
    }

    .primary {
      color: #fff;
      background: var(--sage-dark);
      border-color: var(--sage-dark);
    }

    .danger {
      color: #6f2d20;
      background: #ffe3dc;
      border-color: #f3b8a9;
    }

    .taken-by {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      padding: 9px 10px;
      border-radius: 8px;
      background: #eef5ea;
      color: #31553d;
      font-weight: 800;
    }

    .form {
      display: grid;
      gap: 8px;
    }

    .two {
      display: grid;
      grid-template-columns: 1fr 120px;
      gap: 8px;
    }

    .footer-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      width: min(520px, calc(100% - 28px));
      padding: 12px 14px;
      background: #232323;
      color: #fff;
      border-radius: 8px;
      box-shadow: var(--shadow);
      font-weight: 800;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
      z-index: 20;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-4px);
    }

    @media (min-width: 760px) {
      .stats { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .layout { grid-template-columns: 340px minmax(0, 1fr); }
      .side { position: sticky; top: 14px; }
      .toolbar { top: 0; }
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>

    };

    const initialItems = [
      ["beer-light-1", 10, "bere"],
      ["beer-light-2", 10, "bere"],
      ["beer-ipa", 12, "bere"],
      ["white-wine-1", 12, "bere"],
      ["white-wine-2", 12, "bere"],
      ["spritz", 35, "bere"],
      ["water", 15, "bere"],
      ["soft", 18, "bere"],
      ["juice", 12, "bere"],
      ["ice", 12, "bere"],
      ["focaccia", 35, "salato"],
      ["chips", 18, "salato"],
      ["crackers", 14, "salato"],
      ["salumi", 30, "salato"],
      ["cheese", 25, "salato"],
      ["veggies", 20, "salato"],
      ["olives", 18, "salato"],
      ["sandwiches", 25, "salato"],
      ["home-savory-1", 15, "salato"],
      ["home-savory-2", 15, "salato"],
      ["fruit", 20, "dolce"],
      ["cookies", 15, "dolce"],
      ["home-dessert", 15, "dolce"],
      ["kitchen-jolly", 15, "salato"],
      ["plates", 18, "extra"],
      ["napkins", 8, "extra"],
      ["trash", 6, "extra"],
      ["cooler-1", 0, "extra"],
      ["cooler-2", 0, "extra"],
      ["portable-fridge", 0, "extra"],
      ["speaker", 0, "extra", "Francesco"],
      ["opener", 0, "extra", "Francesco"]
    ].map((row, index) => ({
      id: "item-" + index,
      textKey: row[0],
      name: itemTexts[row[0]][0],
      nameEn: itemTexts[row[0]][1],
      description: itemTexts[row[0]][2],
      descriptionEn: itemTexts[row[0]][3],
      budget: row[1],
      category: row[2],
      takenBy: row[3] || ""
    }));

    let state = {
      lang: "it",
      activeCategory: "tutti",
      freeOnly: false,
      items: loadItems()
    };
    localStorage.setItem("aperitivo-lang", "it");
    let remoteUpdatedAt = 0;
    let syncState = "loading";
    let isSavingRemote = false;
    let syncTimer = null;

    function l() {
      return labels.it;
    }

    function itemName(item) {
      return item.name;
    }

    function itemDescription(item) {
      return item.description;
    }

    function categoryLabel(category) {
      return l().categories[category] || category;
    }

    function cloneItems(items) {
      return JSON.parse(JSON.stringify(items));
    }

    function itemTemplateMap() {
      return new Map(initialItems.map(item => [item.id, item]));
    }

    function normalizeItems(items) {
      if (!Array.isArray(items)) return cloneItems(initialItems);
      const templates = itemTemplateMap();
      return items.map(item => {
        const template = templates.get(item.id) || {};
        return {
          ...template,
          ...item,
          id: String(item.id || "custom-" + Date.now()),
          name: String(item.name || template.name || ""),
          nameEn: String(item.nameEn || item.name || template.nameEn || template.name || ""),
          description: String(item.description || template.description || ""),
          descriptionEn: String(item.descriptionEn || item.description || template.descriptionEn || template.description || ""),
          budget: Number.isFinite(Number(item.budget)) ? Number(item.budget) : Number(template.budget || 0),
          category: item.category || template.category || "salato",
          takenBy: String(item.takenBy || "")
        };
      });
    }

    function localItemsChangedFromInitial(items) {
      return JSON.stringify(normalizeItems(items)) !== JSON.stringify(initialItems);
    }

    function saveLocal() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.items));
    }

    function loadItems() {
      const fromUrl = new URLSearchParams(location.search).get("stato");
      if (fromUrl) {
        try {
          const decoded = JSON.parse(decodeURIComponent(atob(fromUrl)));
          if (Array.isArray(decoded)) {
            const normalized = normalizeItems(decoded);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(normalized));
            history.replaceState(null, "", location.pathname);
            return normalized;
          }
        } catch (error) {}
      }

      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || localStorage.getItem(LEGACY_STORAGE_KEY));
        return Array.isArray(saved) ? normalizeItems(saved) : cloneItems(initialItems);
      } catch (error) {
        return cloneItems(initialItems);
      }
    }

    async function save() {
      saveLocal();
      render();
      await saveRemote();
    }

    function takenItems() {
      return state.items.filter(item => item.takenBy.trim());
    }

    function byGroup(items) {
      return items.reduce((acc, item) => {
        if (item.category === "extra") return acc;
        const group = item.category === "bere" ? "drink" : "food";
        acc[group] += Number(item.budget) || 0;
        return acc;
      }, { drink: 0, food: 0 });
    }

    function defaultBudgetFor(category) {
      if (category === "bere") return 16;
      if (category === "extra") return 6;
      return 18;
    }

    function setSyncState(nextState) {
      syncState = nextState;
      const node = document.getElementById("syncStatus");
      if (!node) return;
      node.dataset.state = nextState;
      node.textContent = l().sync[nextState] || l().sync.online;
    }

    function remotePayload() {
      return {
        version: 5,
        updatedAt: Date.now(),
        items: normalizeItems(state.items)
      };
    }

    function remoteContent(payload) {
      return JSON.stringify([{ tag: "pre", children: [JSON.stringify(payload)] }]);
    }

    function extractRemotePayload(page) {
      const node = page && page.result && Array.isArray(page.result.content) ? page.result.content[0] : null;
      const raw = node && Array.isArray(node.children) ? node.children.join("") : "";
      return raw ? JSON.parse(raw) : null;
    }

    async function fetchRemotePayload() {
      const response = await fetch(REMOTE_STORE.getUrl + "&_=" + Date.now(), { cache: "no-store" });
      if (!response.ok) throw new Error("Remote load failed");
      const page = await response.json();
      if (!page.ok) throw new Error("Remote page unavailable");
      return extractRemotePayload(page);
    }

    async function saveRemote() {
      if (isSavingRemote) return;
      isSavingRemote = true;
      setSyncState("saving");
      try {
        const payload = remotePayload();
        const data = new URLSearchParams();
        data.set("access_token", REMOTE_STORE.accessToken);
        data.set("path", REMOTE_STORE.path);
        data.set("title", REMOTE_STORE.title);
        data.set("content", remoteContent(payload));
        data.set("return_content", "true");
        const response = await fetch(REMOTE_STORE.editUrl, { method: "POST", body: data });
        if (!response.ok) throw new Error("Remote save failed");
        const result = await response.json();
        if (!result.ok) throw new Error("Remote save rejected");
        remoteUpdatedAt = payload.updatedAt;
        setSyncState("updated");
      } catch (error) {
        setSyncState("error");
      } finally {
        isSavingRemote = false;
      }
    }

    async function loadRemote() {
      if (isSavingRemote) return;
      try {
        setSyncState(remoteUpdatedAt ? "online" : "loading");
        const payload = await fetchRemotePayload();
        const remoteItems = normalizeItems(payload && payload.items);
        const remoteLooksReady = remoteItems.length >= initialItems.length - 2;
        const remoteIsNewer = payload && Number(payload.updatedAt || 0) > remoteUpdatedAt;
        if (!payload || !remoteLooksReady) {
          await saveRemote();
          return;
        }
        if (remoteIsNewer) {
          state.items = remoteItems;
          remoteUpdatedAt = Number(payload.updatedAt || Date.now());
          saveLocal();
          render();
        }
        setSyncState("online");
      } catch (error) {
        setSyncState("error");
      }
    }

    async function startSync() {
      const hasLocalChoices = localItemsChangedFromInitial(state.items);
      await loadRemote();
      if (hasLocalChoices && remoteUpdatedAt === 0) await saveRemote();
      syncTimer = setInterval(loadRemote, SYNC_INTERVAL_MS);
    }

    function renderStats() {
      const taken = takenItems();
      const families = new Set(taken.map(item => item.takenBy.trim().toLowerCase())).size;
      const free = state.items.length - taken.length;
      const stats = [
        l().stats.families,
        [l().stats.assigned, String(taken.length), state.items.length + " " + l().stats.totalItems],
        [l().stats.free, String(free), l().stats.choose],
        [l().stats.active, String(families), l().stats.activeHint]
      ];
      document.getElementById("stats").innerHTML = stats.map(stat => `
        <div class="stat">
          <small>${stat[0]}</small>
          <strong>${stat[1]}</strong>
          <em>${stat[2]}</em>
        </div>
      `).join("");
    }

    function renderBalance() {
      const groups = byGroup(takenItems());
      const total = Math.max(groups.drink + groups.food, 1);
      document.getElementById("barDrink").style.width = (groups.drink / total * 100) + "%";
      document.getElementById("barFood").style.width = (groups.food / total * 100) + "%";
      document.getElementById("legend").innerHTML = `
        <span><i class="dot" style="background:var(--blue)"></i>${categoryLabel("bere")} ${Math.round(groups.drink / total * 100)}%</span>
        <span><i class="dot" style="background:var(--coral)"></i>Mangiare ${Math.round(groups.food / total * 100)}%</span>
      `;
    }

    function hasTaken(match) {
      return takenItems().some(item => {
        const haystack = [item.name, item.nameEn, item.description, item.descriptionEn].join(" ").toLowerCase();
        return match(haystack, item.category);
      });
    }

    function renderTips() {
      const groups = byGroup(takenItems());
      const total = Math.max(groups.drink + groups.food, 1);
      const drinkRatio = groups.drink / total;
      const foodRatio = groups.food / total;
      const tips = [];
      const tip = l().tipsText;

      if (!hasTaken((text) => text.includes("acqua") || text.includes("water"))) tips.push(tip.water);
      if (!hasTaken((text) => text.includes("analcolico") || text.includes("bibite") || text.includes("soft") || text.includes("juice"))) tips.push(tip.soft);
      if (!hasTaken((text) => text.includes("ghiaccio") || text.includes("ice"))) tips.push(tip.ice);
      if (!hasTaken((text) => text.includes("borsa frigo") || text.includes("frigobar") || text.includes("cooler") || text.includes("mini-fridge"))) tips.push(tip.cool);
      if (!hasTaken((text) => text.includes("focacce") || text.includes("snack") || text.includes("taralli") || text.includes("focaccia") || text.includes("chips") || text.includes("crackers"))) tips.push(tip.salty);
      if (!hasTaken((text) => text.includes("bicchieri") || text.includes("piatti") || text.includes("cups") || text.includes("plates"))) tips.push(tip.plates);
      if (!hasTaken((text) => text.includes("sacchi") || text.includes("trash"))) tips.push(tip.trash);
      if (drinkRatio > .58 && groups.drink > 60) tips.push(tip.drinkHeavy);
      if (foodRatio > .62 && groups.food > 70) tips.push(tip.foodHeavy);
      if (tips.length === 0) tips.push(tip.good);

      document.getElementById("tips").innerHTML = tips.slice(0, 5).map(tip => `<li>${tip}</li>`).join("");
    }

    function renderTabs() {
      document.getElementById("tabs").innerHTML = Object.entries(categories).map(([key, label]) => `
        <button class="tab ${state.activeCategory === key ? "active" : ""}" data-tab="${key}" type="button">${categoryLabel(key)}</button>
      `).join("");
    }

    function visibleItems() {
      return state.items.filter(item => {
        const categoryOk = state.activeCategory === "tutti" || item.category === state.activeCategory;
        const freeOk = !state.freeOnly || !item.takenBy.trim();
        return categoryOk && freeOk;
      });
    }

    function renderItems() {
      const items = visibleItems();
      document.getElementById("items").innerHTML = items.map(item => {
        const taken = item.takenBy.trim();
        return `
          <article class="item ${taken ? "taken" : ""}" data-category="${item.category}">
            <div class="item-head">
              <div>
                <h3>${itemName(item)}</h3>
                <p>${categoryLabel(item.category)} · ${itemDescription(item)}</p>
              </div>
            </div>
            ${taken ? `
              <div class="taken-by">
                <span>✓ ${l().broughtBy}: ${taken}</span>
                <button class="danger mini" data-free="${item.id}" type="button">${l().free}</button>
              </div>
            ` : `
              <div class="claim">
                <input data-name="${item.id}" placeholder="Il tuo nome / famiglia">
                <button class="primary" data-claim="${item.id}" type="button">${l().bring}</button>
              </div>
            `}
          </article>
        `;
      }).join("") || `<div class="panel"><h2>${l().emptyTitle}</h2><p class="sub">${l().emptyText}</p></div>`;
    }

    function renderStaticText() {
      document.documentElement.lang = "it";
      document.title = "Aperitivo Vivarini 5 - 2 luglio";
      document.getElementById("appTitle").textContent = l().title;
      document.getElementById("appSubtitle").textContent = l().subtitle;
      document.getElementById("dateMonth").textContent = l().month;
      document.getElementById("balanceTitle").textContent = l().balance;
      document.getElementById("tipsTitle").textContent = l().tips;
      document.getElementById("addTitle").textContent = l().add;
      document.getElementById("nameInput").placeholder = l().namePlaceholder;
      document.getElementById("descriptionInput").placeholder = l().descriptionPlaceholder;
      document.getElementById("optionBere").textContent = categoryLabel("bere");
      document.getElementById("optionSalato").textContent = categoryLabel("salato");
      document.getElementById("optionDolce").textContent = categoryLabel("dolce");
      document.getElementById("optionExtra").textContent = categoryLabel("extra");
      document.getElementById("addButton").textContent = l().addButton;
      document.getElementById("shareBtn").textContent = l().share;
      document.getElementById("copyBtn").textContent = l().copy;
      document.getElementById("freeOnlyLabel").textContent = l().freeOnly;
      document.getElementById("resetBtn").textContent = l().reset;
      document.getElementById("resetHint").textContent = l().resetHint;
    }

    function render() {
      renderStaticText();
      renderStats();
      renderBalance();
      renderTips();
      renderTabs();
      renderItems();
      document.getElementById("freeOnly").checked = state.freeOnly;
      setSyncState(syncState);
    }

    function toast(message) {
      const node = document.getElementById("toast");
      node.textContent = message;
      node.classList.add("show");
      setTimeout(() => node.classList.remove("show"), 2200);
    }

    function claim(id) {
      const input = document.querySelector(`[data-name="${id}"]`);
      const name = input ? input.value.trim() : "";
      if (!name) {
        toast(l().writeName);
        return;
      }
      state.items = state.items.map(item => item.id === id ? { ...item, takenBy: name } : item);
      save();
      toast(l().marked);
    }

    function free(id) {
      state.items = state.items.map(item => item.id === id ? { ...item, takenBy: "" } : item);
      save();
      toast(l().freed);
    }

    function shareUrl() {
      const packed = btoa(encodeURIComponent(JSON.stringify(state.items)));
      const base = location.origin === "null"
        ? location.href.split("?")[0]
        : `${location.origin}${location.pathname}`;
      return `${base}?stato=${packed}`;
    }

    async function copyText(text, message) {
      try {
        await navigator.clipboard.writeText(text);
        toast(message);
      } catch (error) {
        prompt("Copia questo testo", text);
      }
    }

    document.addEventListener("click", event => {
      const tab = event.target.closest("[data-tab]");
      const claimBtn = event.target.closest("[data-claim]");
      const freeBtn = event.target.closest("[data-free]");
      if (tab) {
        state.activeCategory = tab.dataset.tab;
        render();
      }
      if (claimBtn) claim(claimBtn.dataset.claim);
      if (freeBtn) free(freeBtn.dataset.free);
    });

    document.getElementById("freeOnly").addEventListener("change", event => {
      state.freeOnly = event.target.checked;
      render();
    });

    document.getElementById("addForm").addEventListener("submit", event => {
      event.preventDefault();
      const data = new FormData(event.currentTarget);
      state.items = [{
        id: "custom-" + Date.now(),
        name: String(data.get("name")).trim(),
        nameEn: String(data.get("name")).trim(),
        description: String(data.get("description")).trim(),
        descriptionEn: String(data.get("description")).trim(),
        budget: defaultBudgetFor(String(data.get("category"))),
        category: String(data.get("category")),
        takenBy: ""
      }, ...state.items];
      event.currentTarget.reset();
      save();
      toast(l().added);
    });

    document.getElementById("shareBtn").addEventListener("click", async () => {
      const url = shareUrl();
      if (navigator.share) {
        try {
          await navigator.share({ title: document.title, url });
          return;
        } catch (error) {}
      }
      copyText(url, l().copiedLink);
    });

    document.getElementById("copyBtn").addEventListener("click", () => {
      const lines = [
        document.title,
        "",
        ...state.items.filter(item => item.takenBy.trim()).map(item => `✓ ${itemName(item)} - ${item.takenBy}`),
        "",
        l().stillFree,
        ...state.items.filter(item => !item.takenBy.trim()).slice(0, 12).map(item => `• ${itemName(item)}`)
      ];
      copyText(lines.join("\n"), l().copiedSummary);
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      if (confirm(l().resetConfirmOne) && confirm(l().resetConfirmTwo)) {
        state.items = cloneItems(initialItems);
        localStorage.removeItem(STORAGE_KEY);
        save();
      }
    });

    render();
    startSync();
  </script>
</body>
</html>
